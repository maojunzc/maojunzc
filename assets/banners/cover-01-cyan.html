<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>maojunzc Cover · Neon Cyan</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .banner {
    position:relative; width:1280px; height:640px; overflow:hidden;
    font-family:"Segoe UI","PingFang SC",system-ui,sans-serif;
    background:url("neon-cyan/Cyberpunk_neon_banner_for_a_Gi_2026-07-13T09-28-38.png") center/cover no-repeat;
  }
  .overlay { position:absolute; inset:0; background:radial-gradient(circle at 50% 45%,rgba(2,6,23,.10),rgba(2,6,23,.55)); }
  .content { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; }
  .handle {
    font-size:88px; font-weight:800; letter-spacing:3px; color:#e6fbff;
    text-shadow:0 0 14px #22d3ee,0 0 34px #22d3ee,0 0 60px #0891b2;
  }
  .tagline {
    margin-top:18px; font-size:28px; font-weight:500; color:#a5f3fc;
    text-shadow:0 0 12px #22d3ee; letter-spacing:2px;
  }
  .chips { margin-top:34px; display:flex; gap:16px; justify-content:center; }
  .chip {
    font-size:18px; font-weight:600; padding:9px 22px; border-radius:999px;
    color:#cffafe; border:1.5px solid #22d3ee;
    box-shadow:0 0 14px rgba(34,211,238,.6),inset 0 0 10px rgba(34,211,238,.25);
    background:rgba(8,47,73,.35); backdrop-filter:blur(4px);
  }
  .badge {
    position:absolute; left:0; right:0; bottom:40px; text-align:center;
    font-size:17px; font-weight:600; color:#67e8f9; letter-spacing:3px;
    text-shadow:0 0 10px #22d3ee;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="overlay"></div>
    <div class="content">
      <div class="handle">@maojunzc</div>
      <div class="tagline">Developer · Automator · AI Explorer</div>
      <div class="chips">
        <span class="chip">TypeScript</span>
        <span class="chip">Python</span>
        <span class="chip">Flutter</span>
        <span class="chip">AI Agent</span>
      </div>
    </div>
    <div class="badge">// build · automate · ship</div>
  </div>
</body>
</html>
