<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>maojunzc Cover · Neon Green</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .banner {
    position:relative; width:1280px; height:640px; overflow:hidden;
    font-family:"Segoe UI","PingFang SC",system-ui,sans-serif;
    background:url("neon-green/Cyberpunk_neon_banner_for_a_pr_2026-07-13T09-28-45.png") center/cover no-repeat;
  }
  .overlay { position:absolute; inset:0; background:radial-gradient(circle at 50% 45%,rgba(2,20,12,.10),rgba(2,20,12,.55)); }
  .content { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); text-align:center; }
  .handle {
    font-size:88px; font-weight:800; letter-spacing:3px; color:#ecfdf5;
    text-shadow:0 0 14px #34d399,0 0 34px #10b981,0 0 60px #059669;
  }
  .tagline {
    margin-top:18px; font-size:28px; font-weight:500; color:#a7f3d0;
    text-shadow:0 0 12px #34d399; letter-spacing:2px;
  }
  .chips { margin-top:34px; display:flex; gap:16px; justify-content:center; }
  .chip {
    font-size:18px; font-weight:600; padding:9px 22px; border-radius:999px;
    color:#d1fae5; border:1.5px solid #34d399;
    box-shadow:0 0 14px rgba(52,211,153,.6),inset 0 0 10px rgba(52,211,153,.25);
    background:rgba(6,78,59,.35); backdrop-filter:blur(4px);
  }
  .badge {
    position:absolute; left:0; right:0; bottom:40px; text-align:center;
    font-size:17px; font-weight:600; color:#6ee7b7; letter-spacing:3px;
    text-shadow:0 0 10px #34d399;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="overlay"></div>
    <div class="content">
      <div class="handle">@maojunzc</div>
      <div class="tagline">Developer · Automator · AI Explorer</div>
      <div class="chips">
        <span class="chip">TypeScript</span>
        <span class="chip">Python</span>
        <span class="chip">Flutter</span>
        <span class="chip">AI Agent</span>
      </div>
    </div>
    <div class="badge">// build · automate · ship</div>
  </div>
</body>
</html>
