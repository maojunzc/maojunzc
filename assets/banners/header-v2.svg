<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1500" height="500" fill="#f4f1ea"/>
  <rect x="28" y="28" width="1444" height="444" fill="none" stroke="#9a8f7a" stroke-width="1" opacity="0.5"/>
  <path d="M22 40 L22 22 L40 22" fill="none" stroke="#9a8f7a" stroke-width="1.5"/>
  <path d="M1478 40 L1478 22 L1460 22" fill="none" stroke="#9a8f7a" stroke-width="1.5"/>
  <path d="M22 460 L22 478 L40 478" fill="none" stroke="#9a8f7a" stroke-width="1.5"/>
  <path d="M1478 460 L1478 478 L1460 478" fill="none" stroke="#9a8f7a" stroke-width="1.5"/>

  <text x="750" y="150" text-anchor="middle" font-style="italic" font-size="88" fill="#2c2a27" letter-spacing="2">maojunzc</text>
  <line x1="690" y1="182" x2="810" y2="182" stroke="#9a8f7a" stroke-width="1"/>

  <text x="750" y="262" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" letter-spacing="3" fill="#5c574f">云和海分居两地，人和人相聚别离。</text>
  <text x="750" y="300" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" letter-spacing="3" fill="#5c574f">一个在夏天停步，另一个在秋天打探消息。</text>
  <text x="750" y="338" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" letter-spacing="3" fill="#5c574f">一个就是喜欢，另一个觉得麻烦。</text>
  <text x="750" y="376" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" letter-spacing="3" fill="#5c574f">总会经历心甘情愿，我知道你不怕难，只是别睡太晚。</text>
</svg>
