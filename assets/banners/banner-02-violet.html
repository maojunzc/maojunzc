<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>maojunzc · Neon Violet</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .banner {
    position:relative; width:1500px; height:500px; overflow:hidden;
    font-family:"Segoe UI","PingFang SC",system-ui,sans-serif;
    background:url("neon-violet/Cyberpunk_neon_banner_for_a_Gi_2026-07-13T09-28-42.png") center/cover no-repeat;
  }
  .overlay { position:absolute; inset:0; background:linear-gradient(90deg,rgba(23,4,46,.55),rgba(23,4,46,.15) 55%,transparent); }
  .content { position:absolute; left:90px; top:50%; transform:translateY(-50%); }
  .handle {
    font-size:64px; font-weight:800; letter-spacing:2px; color:#f5e9ff;
    text-shadow:0 0 12px #c084fc,0 0 28px #a855f7,0 0 48px #7e22ce;
  }
  .tagline {
    margin-top:14px; font-size:24px; font-weight:500; color:#e9d5ff;
    text-shadow:0 0 10px #c084fc; letter-spacing:1px;
  }
  .chips { margin-top:26px; display:flex; gap:14px; }
  .chip {
    font-size:16px; font-weight:600; padding:8px 18px; border-radius:999px;
    color:#f3e8ff; border:1.5px solid #c084fc;
    box-shadow:0 0 12px rgba(192,132,252,.6),inset 0 0 10px rgba(192,132,252,.25);
    background:rgba(59,7,100,.35); backdrop-filter:blur(4px);
  }
  .badge {
    position:absolute; right:70px; bottom:54px; font-size:15px; font-weight:600;
    color:#d8b4fe; letter-spacing:2px; text-shadow:0 0 10px #c084fc;
    border:1px solid rgba(192,132,252,.5); padding:8px 16px; border-radius:8px;
    background:rgba(23,4,46,.4);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="overlay"></div>
    <div class="content">
      <div class="handle">@maojunzc</div>
      <div class="tagline">Developer · Automator · AI Explorer</div>
      <div class="chips">
        <span class="chip">TypeScript</span>
        <span class="chip">Python</span>
        <span class="chip">Flutter</span>
        <span class="chip">AI Agent</span>
      </div>
    </div>
    <div class="badge">// build · automate · ship</div>
  </div>
</body>
</html>
