<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<title>maojunzc Cover · Minimal Literary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .banner {
    position:relative; width:1280px; height:640px; overflow:hidden;
    background:#f4f1ea; color:#3a3733;
    font-family:"Cormorant Garamond","Noto Serif SC",serif;
  }
  .frame { position:absolute; inset:34px; border:1px solid rgba(58,55,51,.25); }
  .corner { position:absolute; width:20px; height:20px; border:1.5px solid #9a8f7a; }
  .c1 { top:28px; left:28px; border-right:none; border-bottom:none; }
  .c2 { top:28px; right:28px; border-left:none; border-bottom:none; }
  .c3 { bottom:28px; left:28px; border-right:none; border-top:none; }
  .c4 { bottom:28px; right:28px; border-left:none; border-top:none; }
  .content { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; }
  .kicker { font-family:"Noto Serif SC",serif; font-size:18px; letter-spacing:10px;
    color:#9a8f7a; font-weight:400; margin-bottom:22px; }
  .handle { font-family:"Cormorant Garamond",serif; font-style:italic; font-weight:500;
    font-size:110px; line-height:1; color:#2c2a27; letter-spacing:2px; }
  .tagline { margin-top:26px; font-family:"Noto Serif SC",serif; font-size:24px;
    font-weight:400; color:#5c574f; letter-spacing:4px; }
  .rule { width:140px; height:1px; background:#9a8f7a; margin-top:30px; }
  .foot { position:absolute; bottom:54px; left:0; right:0; text-align:center;
    font-family:"Cormorant Garamond",serif; font-style:italic; font-size:20px;
    color:#7a7363; letter-spacing:1px; }
</style>
</head>
<body>
  <div class="banner">
    <div class="frame"></div>
    <div class="corner c1"></div><div class="corner c2"></div>
    <div class="corner c3"></div><div class="corner c4"></div>
    <div class="content">
      <div class="kicker">MAO JUN</div>
      <div class="handle">maojunzc</div>
      <div class="tagline">于代码与文字之间，慢慢生长</div>
      <div class="rule"></div>
    </div>
    <div class="foot">build · automate · reflect</div>
  </div>
</body>
</html>
